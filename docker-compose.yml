version: '3.8'

services:
  # Aplicação Unificada IT Asset 360 (Frontend SPA + Backend Node.js API)
  it-asset-360:
    build:
      context: .
      dockerfile: Dockerfile
    image: it-asset-360:latest
    container_name: it-asset-360
    restart: unless-stopped
    ports:
      - "8083:5000" # Expondo a porta 8083 para acesso direto ao sistema
    environment:
      - NODE_ENV=production
      - PORT=5000
      - DB_SERVER=10.10.10.100
      - DB_PORT=1433
      - DB_DATABASE=ITAsset360
      - DB_USER=sa
      - DB_PASSWORD=#41nhAsa#@@2
      - JWT_SECRET=brokerrainha