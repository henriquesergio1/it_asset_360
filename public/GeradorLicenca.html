
<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gerador de Licença - IT Asset 360</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&family=JetBrains+Mono&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
        .mono { font-family: 'JetBrains Mono', monospace; }
    </style>
</head>
<body class="bg-slate-950 text-slate-100 min-h-screen flex items-center justify-center p-6">
    <div class="max-w-2xl w-full bg-slate-900 border border-slate-800 rounded-3xl shadow-2xl overflow-hidden">
        <div class="p-8 border-b border-slate-800 bg-slate-900/50">
            <h1 class="text-3xl font-extrabold text-white tracking-tight">Gerador de Licença JWT</h1>
            <p class="text-slate-400 mt-2">Crie chaves de ativação criptografadas para o sistema IT Asset 360.</p>
        </div>

        <div class="p-8 space-y-6">
            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                <div>
                    <label class="block text-xs font-bold text-slate-500 uppercase tracking-widest mb-2">Nome do Cliente</label>
                    <input type="text" id="client" class="w-full bg-slate-950 border border-slate-700 rounded-xl px-4 py-3 text-slate-100 focus:ring-2 focus:ring-blue-600 outline-none transition-all" placeholder="Ex: Empresa ABC Ltda">
                </div>
                <div>
                    <label class="block text-xs font-bold text-slate-500 uppercase tracking-widest mb-2">Dias de Validade</label>
                    <input type="number" id="days" class="w-full bg-slate-950 border border-slate-700 rounded-xl px-4 py-3 text-slate-100 focus:ring-2 focus:ring-blue-600 outline-none transition-all" value="365">
                </div>
            </div>

            <div>
                <label class="block text-xs font-bold text-slate-500 uppercase tracking-widest mb-2">JWT Secret (Deve ser igual ao do servidor)</label>
                <input type="password" id="secret" class="w-full bg-slate-950 border border-slate-700 rounded-xl px-4 py-3 text-slate-100 focus:ring-2 focus:ring-blue-600 outline-none transition-all" placeholder="Sua chave secreta super segura">
            </div>

            <button onclick="generateToken()" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-4 rounded-xl shadow-lg shadow-blue-600/20 transition-all active:scale-95 flex items-center justify-center gap-2">
                Gerar Chave de Licença
            </button>

            <div id="resultContainer" class="hidden space-y-4 animate-in fade-in slide-in-from-bottom-4 duration-500">
                <label class="block text-xs font-bold text-slate-500 uppercase tracking-widest mb-2">Chave Gerada (Token JWT)</label>
                <div class="relative">
                    <textarea id="result" readonly class="w-full bg-slate-950 border border-blue-900/30 rounded-xl p-4 text-blue-400 text-sm mono min-h-[150px] resize-none focus:outline-none"></textarea>
                    <button onclick="copyToken()" class="absolute top-2 right-2 bg-slate-800 hover:bg-slate-700 text-xs text-slate-300 px-3 py-1.5 rounded-lg transition-all">Copiar</button>
                </div>
                <p class="text-[10px] text-amber-500 font-bold uppercase tracking-widest text-center">Atenção: Guarde esta chave com segurança. Ela é única para este cliente.</p>
            </div>
        </div>
    </div>

    <script>
        async function base64url(source) {
            let encodedSource = btoa(String.fromCharCode.apply(null, new Uint8Array(source)));
            encodedSource = encodedSource.replace(/\+/g, '-').replace(/\//g, '_').replace(/=+$/g, '');
            return encodedSource;
        }

        async function generateToken() {
            const client = document.getElementById('client').value;
            const days = parseInt(document.getElementById('days').value);
            const secret = document.getElementById('secret').value;

            if (!client || !days || !secret) {
                alert('Preencha todos os campos!');
                return;
            }

            const header = { alg: "HS256", typ: "JWT" };
            const now = Math.floor(Date.now() / 1000);
            const expiresAt = now + (days * 24 * 60 * 60);
            
            const payload = {
                client: client,
                expiresAt: new Date(expiresAt * 1000).toISOString(),
                exp: expiresAt,
                iat: now,
                iss: "IT-ASSET-360-GENERATOR"
            };

            const stringifiedHeader = JSON.stringify(header);
            const stringifiedPayload = JSON.stringify(payload);

            const encoder = new TextEncoder();
            const headerBase64 = btoa(stringifiedHeader).replace(/\+/g, '-').replace(/\//g, '_').replace(/=+$/g, '');
            const payloadBase64 = btoa(stringifiedPayload).replace(/\+/g, '-').replace(/\//g, '_').replace(/=+$/g, '');

            const dataToSign = headerBase64 + "." + payloadBase64;
            
            const key = await crypto.subtle.importKey(
                "raw",
                encoder.encode(secret),
                { name: "HMAC", hash: "SHA-256" },
                false,
                ["sign"]
            );

            const signature = await crypto.subtle.sign(
                "HMAC",
                key,
                encoder.encode(dataToSign)
            );

            const signatureBase64 = await base64url(signature);
            const jwt = dataToSign + "." + signatureBase64;

            document.getElementById('result').value = jwt;
            document.getElementById('resultContainer').classList.remove('hidden');
        }

        function copyToken() {
            const copyText = document.getElementById("result");
            copyText.select();
            copyText.setSelectionRange(0, 99999);
            navigator.clipboard.writeText(copyText.value);
            alert("Chave copiada para a área de transferência!");
        }
    </script>
</body>
</html>
